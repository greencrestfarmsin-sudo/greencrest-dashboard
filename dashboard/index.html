<!DOCTYPE html>
<html>

<head>
    <title>Greencrest Farms Monitor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #00ffcc;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #222;
            margin: 10px;
            padding: 20px;
            border-radius: 12px;
            width: 200px;
            font-size: 18px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #00ccaa;
        }

        img {
            width: 90%;
            max-width: 800px;
            border-radius: 12px;
            border: 2px solid #00ffcc;
            margin-top: 20px;
        }

        #cam-status {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>🐔 Greencrest Farms Monitor</h1>
    <h3 id="status">🟡 Connecting...</h3>

    <div class="container">
        <div class="card">🌡️ Temp: <span id="temp">--</span> °C</div>
        <div class="card">💧 Hum: <span id="hum">--</span> %</div>
        <div class="card">🌫️ Gas: <span id="gas">--</span></div>
        <div class="card">🕺 Motion: <span id="motion">--</span></div>
        <div class="card">🐔 Hens: <span id="count">--</span></div>
    </div>

    <!-- CAMERA CONTROL -->
    <button onclick="toggleCamera()">🎥 Toggle Camera</button>

    <div id="cam-container"></div>
    <p id="cam-status">🔴 Camera OFF</p>

    <script>
        // 🔥 Firebase config
        const firebaseConfig = {
            databaseURL: "https://greencrest-dashboard-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("data");

        // 🔥 Firebase data
        db.on("value", (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById("status").innerText = "🟢 Live";

            document.getElementById("temp").innerText = data.temperature;
            document.getElementById("hum").innerText = data.humidity;
            document.getElementById("gas").innerText = data.gas;
            document.getElementById("motion").innerText =
                data.motion == 1 ? "Detected" : "No";

            // Alert background
            if (data.gas > 1500) {
                document.body.style.background = "#400000";
            } else {
                document.body.style.background = "#111";
            }
        });

        // 🔥 Hen count from Jetson
        setInterval(async () => {
            try {
                const res = await fetch("https://hens.greencrestfarms.com/stats");
                const data = await res.json();

                document.getElementById("count").innerText = data.hen_count;
            } catch (err) {
                document.getElementById("count").innerText = "--";
            }
        }, 1000);

        // 🎥 Camera toggle
        let camOn = false;

        function toggleCamera() {
            const box = document.getElementById("cam-container");
            const status = document.getElementById("cam-status");

            if (!camOn) {
                box.innerHTML =
                    '<img id="camera" src="https://hens.greencrestfarms.com/stream">';
                status.innerText = "🟢 Camera Live";
                camOn = true;
            } else {
                box.innerHTML = "";
                status.innerText = "🔴 Camera OFF";
                camOn = false;
            }
        }
    </script>

</body>

</html>
